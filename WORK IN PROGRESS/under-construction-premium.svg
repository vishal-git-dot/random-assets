<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient>
<linearGradient id="n" x1="0" x2="1"><stop offset="0" stop-color="#58a6ff"/><stop offset=".5" stop-color="#7ee787"/><stop offset="1" stop-color="#f2cc60"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#30363d" stroke-width="1"/></pattern>
</defs>
<rect width="100%" height="100%" fill="url(#bg)"/>
<rect width="100%" height="100%" fill="url(#grid)" opacity=".3">
<animateTransform attributeName="transform" type="translate" from="0 0" to="-40 0" dur="8s" repeatCount="indefinite"/></rect>
<g transform="translate(220 170)">
<circle r="70" fill="none" stroke="#58a6ff" stroke-width="8"/>
<g stroke="#58a6ff" stroke-width="8">
<line x1="0" y1="-95" x2="0" y2="-70"/><line x1="0" y1="70" x2="0" y2="95"/>
<line x1="-95" y1="0" x2="-70" y2="0"/><line x1="70" y1="0" x2="95" y2="0"/>
<line x1="67" y1="67" x2="86" y2="86"/><line x1="-67" y1="-67" x2="-86" y2="-86"/>
<line x1="-67" y1="67" x2="-86" y2="86"/><line x1="67" y1="-67" x2="86" y2="-86"/>
<animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/></g>
</g>
<text x="380" y="220" font-size="72" font-family="Segoe UI,Arial" font-weight="700" fill="white">🚧 UNDER CONSTRUCTION 🚧
<animate attributeName="opacity" values="1;.75;1" dur="2s" repeatCount="indefinite"/></text>
<text x="382" y="285" font-size="28" fill="#8b949e" font-family="Segoe UI">This repository is actively being built. Check back soon for updates.</text>
<rect x="380" y="380" width="1100" height="18" rx="9" fill="#30363d"/>
<clipPath id="cp"><rect x="380" y="380" width="1100" height="18" rx="9"/></clipPath>
<g clip-path="url(#cp)">
<rect x="-250" y="380" width="250" height="18" fill="url(#n)" filter="url(#glow)">
<animate attributeName="x" from="130" to="1500" dur="3s" repeatCount="indefinite"/></rect></g>
<text x="380" y="450" font-size="24" fill="#7ee787" font-family="Consolas">STATUS: ACTIVE DEVELOPMENT <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/></text>
</svg>