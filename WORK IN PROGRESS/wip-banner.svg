  <rect x="97" y="117" width="10" height="6" rx="2" transform="rotate(45 102 120)"  fill="#6c63ff" opacity=".3"/>
</g>
<!-- Small gear -->
<g class="gear-small">
  <circle cx="110" cy="118" r="16" fill="none" stroke="#00d2ff" stroke-width="3.5" stroke-opacity=".3"/>
  <circle cx="110" cy="118" r="7"  fill="#00d2ff" opacity=".1"/>
  <circle cx="110" cy="118" r="3"  fill="#00d2ff" opacity=".4"/>
  <rect x="107" y="100" width="6" height="8" rx="2" fill="#00d2ff" opacity=".35"/>
  <rect x="107" y="128" width="6" height="8" rx="2" fill="#00d2ff" opacity=".35"/>
  <rect x="92" y="115" width="8" height="6" rx="2" fill="#00d2ff" opacity=".35"/>
  <rect x="120" y="115" width="8" height="6" rx="2" fill="#00d2ff" opacity=".35"/>
</g>

<!-- Wrench accent -->
<g class="wrench">
  <rect x="158" y="82" width="16" height="48" rx="4" fill="none" stroke="#ff6ef7" stroke-width="2.2" stroke-opacity=".35"/>
  <rect x="154" y="82" width="24" height="10" rx="5" fill="none" stroke="#ff6ef7" stroke-width="2" stroke-opacity=".35"/>
  <rect x="154" y="120" width="24" height="10" rx="5" fill="none" stroke="#ff6ef7" stroke-width="2" stroke-opacity=".35"/>
</g>

<!-- ── MAIN CONTENT ── -->
<!-- WIP label -->
<g class="t1">
  <rect x="222" y="48" width="130" height="19" rx="9.5"
    fill="rgba(255,110,247,.1)" stroke="rgba(255,110,247,.35)" stroke-width=".8"/>
  <circle cx="236" cy="57.5" r="3.5" fill="#ff6ef7" opacity=".8">
    <animate attributeName="opacity" values=".3;1;.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="246" y="62" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" font-weight="600" fill="#ff6ef7" letter-spacing=".8">WORK IN PROGRESS</text>
</g>

<!-- Main heading -->
<g class="t2">
  <text x="222" y="102" font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
    font-size="34" font-weight="800" letter-spacing="-1.2" fill="url(#w-title)" opacity="0">
    Coming Soon
  </text>
</g>

<!-- Sub text + animated dots -->
<g class="t3">
  <text x="222" y="125" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="12.5" fill="rgba(180,195,255,.45)" opacity="0">
    This repo is being built
  </text>
  <text class="dot1" x="372" y="125" font-family="'Segoe UI',system-ui,sans-serif"
