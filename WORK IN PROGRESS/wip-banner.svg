<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
<style>
  /* ── Orbs ── */
  @keyframes orb-a { 0%,100%{opacity:.08;r:120} 50%{opacity:.14;r:136} }
  @keyframes orb-b { 0%,100%{opacity:.06;r:100} 50%{opacity:.11;r:114} }
  .orb-a { animation: orb-a 8s ease-in-out infinite; }
  .orb-b { animation: orb-b 10s ease-in-out infinite 2s; }

  /* ── Scan sweep ── */
  @keyframes scan { from{transform:translateX(-800px)} to{transform:translateX(800px)} }
  .scan { animation: scan 4.5s linear infinite; }

  /* ── Corner brackets draw ── */
  @keyframes brk { from{stroke-dashoffset:70} to{stroke-dashoffset:0} }
  .brk-tl { stroke-dasharray:70; stroke-dashoffset:70; animation: brk .7s ease .05s forwards; }
  .brk-br { stroke-dasharray:70; stroke-dashoffset:70; animation: brk .7s ease .15s forwards; }

  /* ── Gear spin ── */
  @keyframes spin-cw  { to{transform:rotate(360deg)}  }
  @keyframes spin-ccw { to{transform:rotate(-360deg)} }
  .gear-big   { transform-origin:72px 100px; animation:spin-cw  9s linear infinite; }
  .gear-small { transform-origin:110px 118px; animation:spin-ccw 5s linear infinite; }

  /* ── WIP text fade-up ── */
  @keyframes fade-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .t1 { animation: fade-up .6s ease .3s both; }
  .t2 { animation: fade-up .6s ease .55s both; }
  .t3 { animation: fade-up .6s ease .8s both; }

  /* ── Progress bar fill ── */
  @keyframes progress { from{width:0} to{width:198px} }
  .bar-fill { animation: progress 2s cubic-bezier(.4,0,.2,1) 1s both; }

  /* ── Bar shimmer ── */
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
  .shimmer { animation: shimmer 2s ease-in-out 3s infinite; }

  /* ── Dot blink ── */
  @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }
  .dot1 { animation: blink 1.4s ease-in-out infinite 0.0s; }
  .dot2 { animation: blink 1.4s ease-in-out infinite 0.3s; }
  .dot3 { animation: blink 1.4s ease-in-out infinite 0.6s; }

  /* ── Status pulse ── */
  @keyframes pulse { 0%,100%{r:4;opacity:.5} 50%{r:6;opacity:1} }
  .live-dot { animation: pulse 2s ease-in-out infinite 1.8s; }

  /* ── Tag stagger ── */
  @keyframes tag-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .tag1 { animation: tag-in .4s ease 1.2s both; }
  .tag2 { animation: tag-in .4s ease 1.35s both; }
  .tag3 { animation: tag-in .4s ease 1.50s both; }
  .tag4 { animation: tag-in .4s ease 1.65s both; }

  /* ── Divider grow ── */
  @keyframes grow { from{stroke-dashoffset:500} to{stroke-dashoffset:0} }
  .divider { stroke-dasharray:500; stroke-dashoffset:500; animation:grow .8s ease .7s forwards; }

  /* ── Wrench swing ── */
  @keyframes swing { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(18deg)} }
  .wrench { transform-origin:166px 96px; animation:swing 2s ease-in-out infinite; }

  /* ── Floating particles ── */
  @keyframes p1 { 0%{cx:640;cy:180;opacity:0} 15%{opacity:.7} 85%{opacity:.4} 100%{cx:760;cy:20;opacity:0} }
  @keyframes p2 { 0%{cx:700;cy:20;opacity:0} 15%{opacity:.6} 85%{opacity:.3} 100%{cx:580;cy:180;opacity:0} }
  @keyframes p3 { 0%{cx:590;cy:120;opacity:0} 15%{opacity:.5} 85%{opacity:.4} 100%{cx:730;cy:100;opacity:0} }
  .p1 { animation: p1 6s ease-in-out infinite; }
  .p2 { animation: p2 8s ease-in-out infinite 2s; }
  .p3 { animation: p3 5s ease-in-out infinite 4s; }
</style>

<defs>
  <linearGradient id="w-bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
    <stop offset="0%"  stop-color="#03050f"/>
    <stop offset="100%" stop-color="#0b0f22"/>
  </linearGradient>
  <linearGradient id="w-gv" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"  stop-color="#6c63ff"/>
    <stop offset="100%" stop-color="#00d2ff"/>
  </linearGradient>
  <linearGradient id="w-bar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"  stop-color="#6c63ff"/>
    <stop offset="50%" stop-color="#00d2ff"/>
    <stop offset="100%" stop-color="#ff6ef7"/>
  </linearGradient>
  <linearGradient id="w-title" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"  stop-color="#a78bff"/>
    <stop offset="50%" stop-color="#00d2ff"/>
    <stop offset="100%" stop-color="#ff6ef7"/>
  </linearGradient>
  <linearGradient id="w-scan" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#6c63ff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#6c63ff" stop-opacity=".05"/>
    <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="w-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#fff" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="w-bar-clip">
    <rect x="222" y="134" width="198" height="10" rx="5"/>
  </clipPath>
  <clipPath id="w-clip">
    <rect width="800" height="200" rx="16"/>
  </clipPath>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="800" height="200" rx="16" fill="url(#w-bg)"/>

<!-- Ambient orbs -->
<circle class="orb-a" cx="90"  cy="100" r="120" fill="#6c63ff"/>
<circle class="orb-b" cx="710" cy="100" r="100" fill="#00d2ff"/>

<!-- Dot grid -->
<g fill="#fff" opacity=".045">
  <circle cx="200" cy="36" r=".9"/><circle cx="240" cy="36" r=".9"/><circle cx="280" cy="36" r=".9"/>
  <circle cx="320" cy="36" r=".9"/><circle cx="360" cy="36" r=".9"/><circle cx="400" cy="36" r=".9"/>
  <circle cx="440" cy="36" r=".9"/><circle cx="480" cy="36" r=".9"/><circle cx="520" cy="36" r=".9"/>
  <circle cx="560" cy="36" r=".9"/><circle cx="600" cy="36" r=".9"/><circle cx="640" cy="36" r=".9"/>
  <circle cx="680" cy="36" r=".9"/><circle cx="720" cy="36" r=".9"/><circle cx="760" cy="36" r=".9"/>

  <circle cx="200" cy="72" r=".9"/><circle cx="240" cy="72" r=".9"/><circle cx="280" cy="72" r=".9"/>
  <circle cx="320" cy="72" r=".9"/><circle cx="360" cy="72" r=".9"/><circle cx="400" cy="72" r=".9"/>
  <circle cx="440" cy="72" r=".9"/><circle cx="480" cy="72" r=".9"/><circle cx="520" cy="72" r=".9"/>
  <circle cx="560" cy="72" r=".9"/><circle cx="600" cy="72" r=".9"/><circle cx="640" cy="72" r=".9"/>
  <circle cx="680" cy="72" r=".9"/><circle cx="720" cy="72" r=".9"/><circle cx="760" cy="72" r=".9"/>

  <circle cx="200" cy="108" r=".9"/><circle cx="240" cy="108" r=".9"/><circle cx="280" cy="108" r=".9"/>
  <circle cx="320" cy="108" r=".9"/><circle cx="360" cy="108" r=".9"/><circle cx="400" cy="108" r=".9"/>
  <circle cx="440" cy="108" r=".9"/><circle cx="480" cy="108" r=".9"/><circle cx="520" cy="108" r=".9"/>
  <circle cx="560" cy="108" r=".9"/><circle cx="600" cy="108" r=".9"/><circle cx="640" cy="108" r=".9"/>
  <circle cx="680" cy="108" r=".9"/><circle cx="720" cy="108" r=".9"/><circle cx="760" cy="108" r=".9"/>

  <circle cx="200" cy="144" r=".9"/><circle cx="240" cy="144" r=".9"/><circle cx="280" cy="144" r=".9"/>
  <circle cx="320" cy="144" r=".9"/><circle cx="360" cy="144" r=".9"/><circle cx="400" cy="144" r=".9"/>
  <circle cx="440" cy="144" r=".9"/><circle cx="480" cy="144" r=".9"/><circle cx="520" cy="144" r=".9"/>
  <circle cx="560" cy="144" r=".9"/><circle cx="600" cy="144" r=".9"/><circle cx="640" cy="144" r=".9"/>
  <circle cx="680" cy="144" r=".9"/><circle cx="720" cy="144" r=".9"/><circle cx="760" cy="144" r=".9"/>

  <circle cx="200" cy="180" r=".9"/><circle cx="240" cy="180" r=".9"/><circle cx="280" cy="180" r=".9"/>
  <circle cx="320" cy="180" r=".9"/><circle cx="360" cy="180" r=".9"/><circle cx="400" cy="180" r=".9"/>
  <circle cx="440" cy="180" r=".9"/><circle cx="480" cy="180" r=".9"/><circle cx="520" cy="180" r=".9"/>
  <circle cx="560" cy="180" r=".9"/><circle cx="600" cy="180" r=".9"/><circle cx="640" cy="180" r=".9"/>
  <circle cx="680" cy="180" r=".9"/><circle cx="720" cy="180" r=".9"/><circle cx="760" cy="180" r=".9"/>
</g>

<!-- Scan sweep -->
<rect class="scan" y="0" width="260" height="200" fill="url(#w-scan)" clip-path="url(#w-clip)"/>

<!-- Floating particles (right zone) -->
<circle class="p1" r="2" fill="#6c63ff" opacity="0"/>
<circle class="p2" r="1.6" fill="#00d2ff" opacity="0"/>
<circle class="p3" r="1.4" fill="#ff6ef7" opacity="0"/>

