<g class="gear-big">
  <circle cx="72" cy="100" r="28" fill="none" stroke="#6c63ff" stroke-width="5" stroke-opacity=".35"/>
  <circle cx="72" cy="100" r="13" fill="#6c63ff" opacity=".12"/>
