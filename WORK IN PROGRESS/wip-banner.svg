<!-- ── RIGHT SIDE: spinning rings ── -->
<g>
  <!-- Outer ring -->
  <circle cx="722" cy="100" r="58" fill="none" stroke="#6c63ff"
    stroke-width=".8" stroke-opacity=".18" stroke-dasharray="10 18">
    <animateTransform attributeName="transform" type="rotate"
      from="0 722 100" to="360 722 100" dur="24s" repeatCount="indefinite"/>
  </circle>
  <!-- Mid ring -->
  <circle cx="722" cy="100" r="42" fill="none" stroke="#00d2ff"
    stroke-width=".7" stroke-opacity=".14" stroke-dasharray="6 12">
    <animateTransform attributeName="transform" type="rotate"
      from="360 722 100" to="0 722 100" dur="16s" repeatCount="indefinite"/>
  </circle>
  <!-- Inner ring -->
  <circle cx="722" cy="100" r="26" fill="none" stroke="#ff6ef7"
    stroke-width=".6" stroke-opacity=".12" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate"
      from="0 722 100" to="360 722 100" dur="10s" repeatCount="indefinite"/>
  </circle>
  <!-- Core -->
  <circle cx="722" cy="100" r="5" fill="#6c63ff" opacity=".7">
    <animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".4;.9;.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Orbiting dot -->
  <circle r="3.5" fill="#00d2ff" opacity=".8">
    <animateMotion dur="5s" repeatCount="indefinite"
      path="M 722,58 A 42,42 0 1,1 721.9,58 Z"/>
    <animate attributeName="opacity" values=".4;1;.4" dur="5s" repeatCount="indefinite"/>
  </circle>
</g>

