</g>

<!-- ── PROGRESS BAR ── -->
<!-- Track -->
<rect x="222" y="134" width="198" height="10" rx="5"
  fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.08)" stroke-width=".6"/>
<!-- Fill -->
<g clip-path="url(#w-bar-clip)">
  <rect class="bar-fill" x="222" y="134" width="0" height="10" rx="5" fill="url(#w-bar)"/>
  <!-- Shimmer on bar -->
  <rect class="shimmer" x="222" y="134" width="60" height="10" rx="5" fill="url(#w-shimmer)"/>
</g>
<!-- Percent label -->
<text x="428" y="143" font-family="'Courier New',monospace"
  font-size="9" fill="rgba(108,99,255,.7)" opacity="0">
  ~65%
  <animate attributeName="opacity" values="0;1" dur=".4s" fill="freeze" begin="2.8s"/>
</text>

<!-- ── STATUS TAGS ── -->
