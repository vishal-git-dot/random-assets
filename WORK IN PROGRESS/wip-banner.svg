  <text x="336" y="172" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9.5" font-weight="600" fill="#00d2ff">🧪 Testing</text>
</g>
<g class="tag3">
  <rect x="378" y="158" width="68" height="20" rx="10"
    fill="rgba(255,110,247,.1)" stroke="rgba(255,110,247,.3)" stroke-width=".7"/>
  <text x="412" y="172" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
